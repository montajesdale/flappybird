<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flappy Logos — Theology Edition</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#c9e6ff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Georgia", serif;
  }
  canvas {
    background: #f5f5f5;
    border: 3px solid #333;
  }
</style>
</head>
<body>

<canvas id="game" width="360" height="520"></canvas>



<script>
const lessons = [
  { term: "Logos", explanation: "Reason or Word; the rational principle ordering reality." },
  { term: "Nous", explanation: "Intellect; the faculty that apprehends first principles." },
  { term: "Epistēmē", explanation: "Scientific knowledge grounded in necessary truths." },
  { term: "Sophia", explanation: "Wisdom; the integration of knowledge and understanding." },
  { term: "Aletheia", explanation: "Truth as unconcealment of what is." },
  { term: "Telos", explanation: "End or purpose toward which a thing is ordered." },
  { term: "Physis", explanation: "Nature; the intrinsic principle of motion and rest." }
];

let currentLesson = null;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let logosY = 260;
let velocity = 0;
const gravity = 0.5;
const jump = -8;

let obstacles = [];
let frame = 0;
let wisdom = 0;
let gameOver = false;

function resetGame() {
  logosY = 260;
  velocity = 0;
  obstacles = [];
  wisdom = 0;
  frame = 0;
  gameOver = false;
}

document.addEventListener("keydown", action);
document.addEventListener("click", action);

function action() {
  if (gameOver) resetGame();
  else velocity = jump;
}

function drawLogos() {
  const x = 60;
  const y = logosY;

  // Wings (black)
  ctx.fillStyle = "#000";

  // Left wing
  ctx.beginPath();
  ctx.moveTo(x - 20, y);
  ctx.quadraticCurveTo(x - 42, y - 12, x - 22, y - 22);
  ctx.quadraticCurveTo(x - 28, y - 6, x - 20, y);
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(x + 20, y);
  ctx.quadraticCurveTo(x + 42, y - 12, x + 22, y - 22);
  ctx.quadraticCurveTo(x + 28, y - 6, x + 20, y);
  ctx.fill();

  // Book pages (black)
  ctx.fillRect(x - 14, y - 10, 12, 20);
  ctx.fillRect(x + 2, y - 10, 12, 20);

  // Book spine (slightly lighter)
  ctx.strokeStyle = "#222";
  ctx.beginPath();
  ctx.moveTo(x, y - 10);
  ctx.lineTo(x, y + 10);
  ctx.stroke();

  // Logos label
  ctx.fillStyle = "#000";
  ctx.font = "9px Georgia";
  ctx.fillText("Br.CliffordSorita", x - 18, y + 28);
}

function drawObstacles() {
  ctx.fillStyle = "#8b0000";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, 0, 50, o.top);
    ctx.fillRect(o.x, o.bottom, 50, canvas.height);
  });
}

function updateObstacles() {
  if (frame % 110 === 0) {
    const gap = 140;
    const top = Math.random() * 220 + 30;
    obstacles.push({
      x: canvas.width,
      top: top,
      bottom: top + gap
    });
  }
  obstacles.forEach(o => o.x -= 2);
  obstacles = obstacles.filter(o => o.x > -50);
}

function checkCollision() {
  if (logosY < 0 || logosY > canvas.height) gameOver = true;
  obstacles.forEach(o => {
    if (
      60 > o.x &&
      60 < o.x + 50 &&
      (logosY < o.top || logosY > o.bottom)
    ) {
      gameOver = true;
    }
  });
}

function drawWisdom() {
  ctx.fillStyle = "#000";
  ctx.font = "20px Georgia";
  ctx.fillText("Wisdom: " + wisdom, 10, 30);
}

function drawGameOver() {
  ctx.fillStyle = "#000";
  ctx.font = "26px Georgia";
  ctx.fillText("Intellectual Collapse", 70, 240);
  ctx.font = "14px Georgia";
  ctx.fillText("Click or Press a Key to Reflect Again", 55, 270);
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    velocity += gravity;
    logosY += velocity;
    updateObstacles();
    checkCollision();
    frame++;
    if (frame % 12 === 0) {
  wisdom++;

  if (wisdom % 20 === 0) {
    currentLesson = lessons[(wisdom / 20 - 1) % lessons.length];
  }
}
  }

  function drawLesson() {
  if (!currentLesson) return;

  ctx.fillStyle = "#000";
  ctx.font = "14px Georgia";
  ctx.fillText("Concept: " + currentLesson.term, 10, canvas.height - 60);

  ctx.font = "12px Georgia";
  ctx.fillText(currentLesson.explanation, 10, canvas.height - 40);
}

  drawLogos();
  drawObstacles();
  drawWisdom();
  drawLesson();

  if (gameOver) drawGameOver();

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
